      <text x="72" y="151" class="sans caps" font-size="12" font-weight="700" fill="#7790A7">THE ESC RECOGNITION LAB</text>
      <text x="69" y="234" class="serif" font-size="78" font-weight="400" letter-spacing="-3.3" fill="#F6F3EA">Lee la seńal.</text>
      <text x="69" y="306" class="serif" font-size="78" font-weight="400" letter-spacing="-3.3" fill="#F6F3EA">Nombra el <tspan fill="#58E89B">ESC.</tspan></text>

      <text x="73" y="355" class="sans" font-size="18" font-weight="500" fill="#91A1B0">16 escenarios. Un método visual. De reconocimiento a mitigación.</text>

