      <text x="120" y="434" class="mono" font-size="15" fill="#466074">&#8594;</text>
      <text x="150" y="434" class="mono" font-size="15" font-weight="600" fill="#DBE5EC">signature</text>
      <text x="246" y="434" class="mono" font-size="15" fill="#466074">&#8594;</text>
      <text x="276" y="434" class="mono" font-size="15" font-weight="600" fill="#58E89B">ESC</text>
      <text x="318" y="434" class="mono" font-size="15" fill="#466074">&#8594;</text>
      <text x="348" y="434" class="mono" font-size="15" font-weight="600" fill="#DBE5EC">mitigate</text>

