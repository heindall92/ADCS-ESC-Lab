<svg width="1280" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400">
  <style>
    .hero-title {
      font-size: 56px;
      font-weight: 700;
      font-family: 'Instrument Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      letter-spacing: -0.03em;
    }
    .hero-accent {
      font-size: 56px;
      font-weight: 700;
      font-family: 'Instrument Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      letter-spacing: -0.03em;
    }
    .hero-sub {
      font-size: 22px;
      font-weight: 500;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      opacity: 0.75;
    }
    .hero-body {
      font-size: 17px;
      font-weight: 400;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      opacity: 0.65;
    }
    .eyebrow {
      font-size: 13px;
      font-weight: 600;
      font-family: system-ui, sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .stat-k {
      font-size: 28px;
      font-weight: 600;
      font-family: ui-monospace, 'JetBrains Mono', monospace;
    }
    .stat-v {
      font-size: 10px;
      font-weight: 600;
      font-family: system-ui, sans-serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.55;
    }
    .mono {
      font-family: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
      font-size: 13px;
    }
    .fade {
      animation: fadeIn 1.2s ease-in-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
  <defs>
    <linearGradient id="mesh-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a7f5a"/>
      <stop offset="45%" stop-color="#3dd68c"/>
      <stop offset="100%" stop-color="#4f8cff"/>
    </linearGradient>
    <radialGradient id="glow-1" cx="15%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#3dd68c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3dd68c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-2" cx="90%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#4f8cff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4f8cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass-panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="blur-40">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1280" height="400" fill="#0d1117"/>
  <rect width="1280" height="400" fill="url(#glow-1)"/>
  <rect width="1280" height="400" fill="url(#glow-2)"/>

  <!-- Mesh blobs difuminados -->
  <ellipse cx="200" cy="320" rx="280" ry="180" fill="#3dd68c" opacity="0.12" filter="url(#blur-40)"/>
  <ellipse cx="1080" cy="80" rx="240" ry="160" fill="#4f8cff" opacity="0.1" filter="url(#blur-40)"/>

  <!-- Ondas -->
  <g opacity="0.3">
    <path d="M0 280Q 320 340 640 300T 1280 320L 1280 0L 0 0Z" fill="url(#mesh-grad)">
      <animate attributeName="d" dur="22s" repeatCount="indefinite"
        values="M0 280Q 320 340 640 300T 1280 320L 1280 0L 0 0Z;M0 300Q 320 310 640 330T 1280 290L 1280 0L 0 0Z;M0 280Q 320 340 640 300T 1280 320L 1280 0L 0 0Z"/>
    </path>
  </g>

  <!-- Marco glass exterior -->
  <rect x="24" y="20" width="1232" height="360" rx="20" fill="url(#glass-panel)" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- macOS dots -->
  <circle cx="52" cy="44" r="7" fill="#ff5f56"/>
  <circle cx="72" cy="44" r="7" fill="#ffbd2e"/>
  <circle cx="92" cy="44" r="7" fill="#27c93f"/>

  <!-- Contenido hero izquierda -->
  <g class="fade">
    <text x="72" y="100" class="eyebrow" fill="#3dd68c">Active Directory Certificate Services</text>
    <text x="72" y="168" class="hero-title" fill="#f0f6fc">Aprende a identificar</text>
    <text x="72" y="228" class="hero-accent" fill="#f59e0b">los 16 ESC</text>
    <text x="72" y="268" class="hero-sub" fill="#c9d1d9">con Certipy v5</text>
    <text x="72" y="310" class="hero-body" fill="#8b949e">Lab multimedia inmersivo ť ES/EN ť Glass UI ť Solo entornos autorizados</text>
  </g>

  <!-- Stats glass -->
  <g transform="translate(72, 330)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="520" height="52" rx="12" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <line x1="130" y1="8" x2="130" y2="44" stroke="#ffffff" stroke-opacity="0.1"/>
    <line x1="260" y1="8" x2="260" y2="44" stroke="#ffffff" stroke-opacity="0.1"/>
    <line x1="390" y1="8" x2="390" y2="44" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="65" y="24" text-anchor="middle" class="stat-k" fill="#f0f6fc">16</text>
    <text x="65" y="40" text-anchor="middle" class="stat-v" fill="#8b949e">ESC</text>
    <text x="195" y="24" text-anchor="middle" class="stat-k" fill="#f0f6fc">5</text>
    <text x="195" y="40" text-anchor="middle" class="stat-v" fill="#8b949e">Grupos</text>
    <text x="325" y="24" text-anchor="middle" class="stat-k" fill="#f0f6fc">v5</text>
    <text x="325" y="40" text-anchor="middle" class="stat-v" fill="#8b949e">Certipy</text>
    <text x="455" y="24" text-anchor="middle" class="stat-k" fill="#f0f6fc">ESťEN</text>
    <text x="455" y="40" text-anchor="middle" class="stat-v" fill="#8b949e">i18n</text>
  </g>

  <!-- Terminal glass (derecha) -->
  <g transform="translate(680, 72)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="560" height="288" rx="16" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.18"/>
    <!-- Barra terminal -->
    <rect x="0" y="0" width="560" height="40" rx="16" fill="#ffffff" fill-opacity="0.04"/>
    <rect x="0" y="24" width="560" height="16" fill="#ffffff" fill-opacity="0.04"/>
    <circle cx="20" cy="20" r="5" fill="#484f58"/>
    <circle cx="36" cy="20" r="5" fill="#484f58"/>
    <circle cx="52" cy="20" r="5" fill="#484f58"/>
    <text x="72" y="24" class="mono" font-size="11" fill="#8b949e">certipy-ad find &#8212; lab.local</text>
    <!-- Lťneas -->
    <text x="20" y="68" class="mono" fill="#c9d1d9">$ certipy-ad find -u lowpriv@lab.local -dc-ip 10.10.10.10</text>
    <text x="20" y="96" class="mono" fill="#6e7681">[*] Finding certificate templates</text>
    <text x="20" y="124" class="mono" fill="#6e7681">[*] Found 34 certificate templates</text>
    <text x="20" y="152" class="mono" fill="#d29922">[!] Vulnerabilities</text>
    <text x="36" y="180" class="mono" fill="#3dd68c">ESC1 : ENROLLEE_SUPPLIES_SUBJECT enabled</text>
    <text x="36" y="208" class="mono" fill="#3dd68c">ESC4 : dangerous template permissions</text>
    <text x="36" y="236" class="mono" fill="#3dd68c">ESC8 : Web Enrollment, NTLM allowed</text>
    <text x="20" y="268" class="mono" fill="#a5d6ff">[+] Saved BloodHound data to 20260716.zip</text>
  </g>
</svg>
