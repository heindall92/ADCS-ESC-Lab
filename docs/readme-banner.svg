          <text x="12" y="20" class="mono" font-size="9" font-weight="800" fill="#58E89B">ESC1</text>
          <text x="52" y="20" class="sans" font-size="9" fill="#8EA0AE">Template</text>
          <rect y="42" width="170" height="32" rx="9" fill="#52E695" fill-opacity="0.075" stroke="#52E695" stroke-opacity="0.27"/>
          <text x="12" y="62" class="mono" font-size="9" font-weight="800" fill="#58E89B">ESC4</text>
