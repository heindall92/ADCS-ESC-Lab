    <rect width="1440" height="560" fill="url(#green-glow)"/>

    <!-- Cinematic light traces -->
    <path d="M-120 462C244 374 483 455 782 346C1041 251 1198 61 1574 105" stroke="url(#signal)" stroke-opacity="0.18" stroke-width="1.4"/>
    <path d="M-102 493C275 398 523 487 809 377C1082 272 1229 92 1552 129" stroke="url(#signal)" stroke-opacity="0.08" stroke-width="18" filter="url(#blue-bloom)"/>
    <circle cx="1114" cy="209" r="132" fill="#1689E8" fill-opacity="0.055" filter="url(#blue-bloom)"/>
    <circle cx="823" cy="497" r="78" fill="#52E695" fill-opacity="0.08" filter="url(#green-bloom)"/>

