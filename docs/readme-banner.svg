          <rect x="26" width="18" height="18" rx="4" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.13"/>
          <rect x="52" width="18" height="18" rx="4" fill="#52E695" fill-opacity="0.3" stroke="#52E695"/>
          <rect x="78" width="18" height="18" rx="4" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.13"/>
          <rect x="104" width="18" height="18" rx="4" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.13"/>
          <rect x="130" width="18" height="18" rx="4" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.13"/>
          <rect x="156" width="18" height="18" rx="4" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.13"/>

          <rect y="26" width="18" height="18" rx="4" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.13"/>
          <rect x="26" y="26" width="18" height="18" rx="4" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.13"/>
          <rect x="52" y="26" width="18" height="18" rx="4" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.13"/>
          <rect x="78" y="26" width="18" height="18" rx="4" fill="#52E695" fill-opacity="0.3" stroke="#52E695"/>
          <rect x="104" y="26" width="18" height="18" rx="4" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.13"/>
          <rect x="130" y="26" width="18" height="18" rx="4" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.13"/>
          <rect x="156" y="26" width="18" height="18" rx="4" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.13"/>
