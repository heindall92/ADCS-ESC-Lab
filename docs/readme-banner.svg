<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="82" y1="34" x2="1378" y2="542" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050A12"/>
      <stop offset="0.58" stop-color="#07111E"/>
      <stop offset="1" stop-color="#061625"/>
    </linearGradient>
    <radialGradient id="blue-glow" cx="0" cy="0" r="1" gradientTransform="translate(1242 88) rotate(137) scale(472 358)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1689E8" stop-opacity="0.31"/>
      <stop offset="1" stop-color="#1689E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="green-glow" cx="0" cy="0" r="1" gradientTransform="translate(704 565) rotate(-81) scale(235 534)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4BE38D" stop-opacity="0.19"/>
      <stop offset="1" stop-color="#4BE38D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="signal" x1="156" y1="0" x2="576" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#52E695"/>
      <stop offset="0.52" stop-color="#31C98E"/>
      <stop offset="1" stop-color="#198FE8"/>
    </linearGradient>
    <linearGradient id="glass" x1="822" y1="66" x2="1342" y2="500" gradientUnits="userSpaceOnUse">
