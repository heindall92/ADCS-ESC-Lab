<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #0a0e17;
        font-family: "Instrument Sans", system-ui, -apple-system, sans-serif;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1080px;
        overflow: hidden;
      }
      .bg-mesh {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 70% 55% at 18% 88%, rgba(61, 214, 140, 0.28), transparent 58%),
          radial-gradient(ellipse 55% 45% at 88% 12%, rgba(79, 140, 255, 0.22), transparent 55%),
          radial-gradient(ellipse 90% 60% at 50% -10%, rgba(88, 166, 255, 0.12), transparent 70%),
          #0a0e17;
      }
      .glass-frame {
        position: absolute;
        inset: 48px;
        border-radius: 32px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.05);
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(28px);
        overflow: hidden;
      }
      .sweep {
        position: absolute;
        top: -20%;
        left: -40%;
        width: 45%;
        height: 140%;
        background: linear-gradient(
          105deg,
          transparent 0%,
          rgba(255, 255, 255, 0.03) 42%,
          rgba(88, 166, 255, 0.35) 50%,
          rgba(61, 214, 140, 0.25) 54%,
          transparent 62%
        );
        transform: skewX(-18deg);
        pointer-events: none;
      }
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(40px);
        pointer-events: none;
      }
      .orb-a { width: 280px; height: 280px; left: -40px; bottom: 120px; background: rgba(61, 214, 140, 0.35); }
      .orb-b { width: 220px; height: 220px; right: -20px; top: 80px; background: rgba(79, 140, 255, 0.3); }
      .dots {
        position: absolute;
        top: 28px;
        left: 28px;
        display: flex;
        gap: 10px;
      }
      .dot { width: 14px; height: 14px; border-radius: 50%; }
      .dot-r { background: #ff5f56; }
      .dot-y { background: #ffbd2e; }
      .dot-g { background: #27c93f; }
      .shield-wrap {
        position: absolute;
        left: 50%;
        top: 42%;
        transform: translate(-50%, -50%);
        width: 220px;
        height: 220px;
      }
      .shield-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 0 60px rgba(61, 214, 140, 0.25);
      }
      .shield-core {
        position: absolute;
        inset: 28px;
        border-radius: 50%;
        background: rgba(13, 17, 23, 0.85);
        border: 2px solid rgba(61, 214, 140, 0.55);
        display: grid;
        place-items: center;
      }
      .shield-svg { width: 96px; height: 96px; }
      .esc-badge {
        position: absolute;
        padding: 10px 18px;
        border-radius: 999px;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.08em;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: #e6edf3;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(12px);
      }
      .esc-badge strong { color: #3dd68c; }
      .esc-1 { left: 72px; top: 210px; }
      .esc-4 { right: 72px; top: 250px; }
      .esc-8 { left: 50%; bottom: 290px; transform: translateX(-50%); }
      .terminal {
        position: absolute;
        left: 56px;
        right: 56px;
        bottom: 56px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.35);
        overflow: hidden;
      }
      .terminal-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        color: rgba(230, 237, 243, 0.55);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 12px;
      }
      .terminal-body {
        padding: 18px 20px 22px;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 13px;
        line-height: 1.65;
        min-height: 148px;
      }
      .line { opacity: 0; transform: translateY(8px); }
      .cmd { color: #c9d1d9; }
      .muted { color: #6e7681; }
      .warn { color: #d29922; }
      .ok { color: #3dd68c; }
      .accent { color: #58a6ff; }
      .title-chip {
        position: absolute;
        top: 88px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 22px;
        border-radius: 999px;
        border: 1px solid rgba(88, 166, 255, 0.35);
        background: rgba(88, 166, 255, 0.12);
        color: #58a6ff;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .streak {
        position: absolute;
        height: 2px;
        background: linear-gradient(90deg, transparent, #58a6ff, #3dd68c, transparent);
        opacity: 0;
        filter: blur(0.5px);
      }
      .streak-a { width: 420px; top: 180px; left: 120px; transform: rotate(-8deg); }
      .streak-b { width: 360px; bottom: 360px; right: 90px; transform: rotate(12deg); }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="adcs-hero"
      data-start="0"
      data-duration="8"
      data-width="1080"
      data-height="1080"
    >
      <div class="bg-mesh clip" data-start="0" data-duration="8" data-track-index="0"></div>

      <div id="glass" class="glass-frame clip" data-start="0" data-duration="8" data-track-index="1">
        <div class="dots">
          <span class="dot dot-r"></span>
          <span class="dot dot-y"></span>
          <span class="dot dot-g"></span>
        </div>

        <div id="sweep" class="sweep"></div>
        <div class="orb orb-a" id="orb-a"></div>
        <div class="orb orb-b" id="orb-b"></div>
        <div class="streak streak-a" id="streak-a"></div>
        <div class="streak streak-b" id="streak-b"></div>

        <div id="chip" class="title-chip clip" data-start="0.2" data-duration="7.6" data-track-index="2">
          ADCS · Certipy v5
        </div>

        <div id="shield" class="shield-wrap clip" data-start="0" data-duration="8" data-track-index="3">
          <div class="shield-ring" id="ring"></div>
          <div class="shield-core">
            <svg class="shield-svg" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M48 8 L78 22 V46 C78 66 62 78 48 84 C34 78 18 66 18 46 V22 Z" stroke="#3dd68c" stroke-width="3"/>
              <rect x="30" y="38" width="36" height="28" rx="4" stroke="#3dd68c" stroke-width="2.5"/>
              <line x1="36" y1="48" x2="60" y2="48" stroke="#3dd68c" stroke-width="2"/>
              <line x1="36" y1="56" x2="54" y2="56" stroke="#3dd68c" stroke-width="2"/>
              <circle cx="48" cy="28" r="6" fill="#3dd68c"/>
            </svg>
          </div>
        </div>

        <div id="esc1" class="esc-badge esc-1 clip" data-start="1.2" data-duration="6.4" data-track-index="4"><strong>ESC1</strong> template</div>
        <div id="esc4" class="esc-badge esc-4 clip" data-start="1.6" data-duration="6" data-track-index="5"><strong>ESC4</strong> ACL</div>
        <div id="esc8" class="esc-badge esc-8 clip" data-start="2" data-duration="5.6" data-track-index="6"><strong>ESC8</strong> relay</div>

        <div id="terminal" class="terminal clip" data-start="0.4" data-duration="7.4" data-track-index="7">
          <div class="terminal-bar">certipy-ad find — lab.local</div>
          <div class="terminal-body">
            <div id="l1" class="line cmd">$ certipy-ad find -dc-ip 10.10.10.10</div>
            <div id="l2" class="line muted">[*] Finding certificate templates</div>
            <div id="l3" class="line warn">[!] Vulnerabilities</div>
            <div id="l4" class="line ok">ESC1 · ESC4 · ESC8 detected</div>
            <div id="l5" class="line accent">[+] BloodHound export ready</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, repeat: -1 });

      tl.fromTo("#glass", { opacity: 0, scale: 0.94 }, { opacity: 1, scale: 1, duration: 1.1, ease: "power3.out" }, 0);
      tl.fromTo("#sweep", { x: "-120%" }, { x: "280%", duration: 1.8, ease: "power2.inOut" }, 0.2);
      tl.fromTo("#chip", { opacity: 0, y: -16 }, { opacity: 1, y: 0, duration: 0.7, ease: "power2.out" }, 0.35);
      tl.fromTo("#shield", { opacity: 0, scale: 0.6, rotate: -8 }, { opacity: 1, scale: 1, rotate: 0, duration: 1.2, ease: "back.out(1.6)" }, 0.45);
      tl.to("#ring", { boxShadow: "0 0 90px rgba(61,214,140,0.55)", duration: 0.9, yoyo: true, repeat: 1, ease: "sine.inOut" }, 1.1);

      tl.fromTo("#esc1", { opacity: 0, x: -40, filter: "blur(8px)" }, { opacity: 1, x: 0, filter: "blur(0px)", duration: 0.65, ease: "power3.out" }, 1.2);
      tl.fromTo("#esc4", { opacity: 0, x: 40, filter: "blur(8px)" }, { opacity: 1, x: 0, filter: "blur(0px)", duration: 0.65, ease: "power3.out" }, 1.55);
      tl.fromTo("#esc8", { opacity: 0, y: 24, filter: "blur(8px)" }, { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.65, ease: "power3.out" }, 1.9);

      tl.fromTo("#streak-a", { opacity: 0, scaleX: 0.2 }, { opacity: 0.9, scaleX: 1, duration: 0.8, ease: "power2.out" }, 1.4);
      tl.to("#streak-a", { opacity: 0, duration: 0.5 }, 2.4);
      tl.fromTo("#streak-b", { opacity: 0, scaleX: 0.2 }, { opacity: 0.85, scaleX: 1, duration: 0.8, ease: "power2.out" }, 2.1);
      tl.to("#streak-b", { opacity: 0, duration: 0.5 }, 3.1);

      tl.fromTo("#terminal", { opacity: 0, y: 28 }, { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, 0.55);
      ["#l1", "#l2", "#l3", "#l4", "#l5"].forEach((sel, i) => {
        tl.fromTo(sel, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" }, 1.8 + i * 0.22);
      });

      tl.to("#orb-a", { x: 30, y: -20, duration: 3, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0.5);
      tl.to("#orb-b", { x: -25, y: 18, duration: 3.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0.8);

      tl.to("#glass", { opacity: 0.92, duration: 0.6, ease: "power1.in" }, 7.2);

      window.__timelines["adcs-hero"] = tl;
    </script>
  </body>
</html>
